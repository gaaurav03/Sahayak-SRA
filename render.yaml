services:
  - type: web
    name: sahayak-api
    env: node
    plan: free
    buildCommand: pnpm install && pnpm run build --filter @sahayak/api
    startCommand: pnpm --filter @sahayak/api start
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
